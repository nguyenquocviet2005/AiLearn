[project]
name = "ailearn-schemas"
version = "0.1.0"
description = "Shared AiLearn V1 contract schemas (JSON Schema + Pydantic)"
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.11.0,<3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ailearn_schemas"]
