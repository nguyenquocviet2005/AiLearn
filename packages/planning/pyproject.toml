[project]
name = "ailearn-planning"
version = "0.1.0"
description = "Deterministic class planning and intervention grouping policies"
requires-python = ">=3.12,<3.13"
dependencies = [
  "ailearn-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ailearn_planning"]

[tool.uv.sources]
ailearn-schemas = { path = "../schemas", editable = true }
