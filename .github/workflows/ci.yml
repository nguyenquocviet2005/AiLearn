name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  api:
    name: API checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --project apps/api --locked --all-groups
      - run: >-
          uv run --project apps/api ruff format --check
          apps/api packages/planning tests/unit/planning
      - run: >-
          uv run --project apps/api ruff check
          apps/api packages/planning tests/unit/planning
      - run: uv run --project apps/api mypy apps/api/src packages/planning/src
      - run: >-
          uv run --project apps/api pytest
          tests/unit/schemas
          tests/unit/diagnostic
          tests/unit/planning
          tests/unit/content
          tests/unit/remediation
          apps/api/tests
      - run: uv build --project apps/api
